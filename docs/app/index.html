<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>SealTrust Rewards</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#f3f4f6}
:root{--navy:#0F1E35;--indigo:#6366F1;--green:#22C55E;--amber:#F59E0B;--teal:#06B6D4}
.shell{width:390px;height:844px;margin:20px auto;background:#F9FAFB;border-radius:50px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.25);display:flex;flex-direction:column}
.bar{background:#fff;display:flex;justify-content:space-between;align-items:center;padding:14px 28px 8px;font-size:12px;font-weight:600;flex-shrink:0}
.hdr{background:#fff;padding:12px 24px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:1px solid #F3F4F6}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--indigo),#8B5CF6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}.content::-webkit-scrollbar{display:none}
.hero{background:linear-gradient(145deg,var(--navy),#1a3054);padding:28px 24px 32px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;width:200px;height:200px;background:rgba(99,102,241,.2);border-radius:50%;top:-60px;right:-40px}
.pts{font-size:64px;font-weight:800;color:#fff;letter-spacing:-2px;position:relative;z-index:1}
.pts span{font-size:24px;font-weight:600;opacity:.7}
.sub{font-size:13px;color:rgba(255,255,255,.55);margin-top:6px;position:relative;z-index:1}
.pbar{background:rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;margin-top:20px;position:relative;z-index:1}
.pbg{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.pfill{height:100%;width:0;background:linear-gradient(90deg,var(--indigo),var(--teal));border-radius:4px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:20px 16px 0}
.stat{background:#fff;border-radius:18px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sv{font-size:26px;font-weight:800;color:#1F2937}.sl{font-size:11px;color:#9CA3AF;margin-top:2px}
.scan-btn{margin:16px;padding:16px;background:linear-gradient(135deg,#7C3AED,var(--indigo));border-radius:18px;color:#fff;text-align:center;cursor:pointer;font-weight:700;font-size:15px;box-shadow:0 8px 24px rgba(99,102,241,.35)}
.nav{position:absolute;bottom:0;left:0;right:0;height:80px;background:#fff;border-top:1px solid #F3F4F6;display:flex;align-items:flex-start;padding-top:10px;z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 0}
.ni.a .nl{color:var(--indigo)}.nl{font-size:10px;font-weight:600;color:#9CA3AF}
.toast{position:absolute;top:90px;left:50%;transform:translateX(-50%) translateY(-20px);background:#1F2937;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:200;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.confetti{position:absolute;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:300;animation:cf 1.2s ease-out forwards}
@keyframes cf{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(300px) rotate(720deg);opacity:0}}
.hi{background:#fff;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.hi-icon{width:40px;height:40px;border-radius:12px;background:#DCFCE7;display:flex;align-items:center;justify-content:center;font-size:18px}
@media(max-width:430px){.shell{width:100%;height:100vh;margin:0;border-radius:0}}
</style>
</head>
<body>
<div class="shell" id="app">
<div class="toast" id="toast"></div>
<div class="bar"><span>9:41</span><div style="flex:1"></div><span style="display:flex;gap:5px">&#x1F4F6; &#x1F50B;</span></div>
<div class="hdr">
<div style="display:flex;align-items:center;gap:10px">
<div class="avatar">M</div>
<div><div style="font-size:13px;color:#9CA3AF">Good morning</div><div style="font-size:16px;font-weight:700">Marcus</div></div>
</div>
<div style="width:38px;height:38px;border-radius:50%;background:#F3F4F6;display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="showToast('No new notifications')">&#x1F514;</div>
</div>
<div class="content">
<div class="hero">
<div style="font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:8px">Your SealPoints</div>
<div class="pts" id="pts">35 <span>pts</span></div>
<div class="sub">Verified 7 deliveries this week</div>
<div class="pbar">
<div style="display:flex;justify-content:space-between;margin-bottom:10px">
<span style="font-size:12px;color:rgba(255,255,255,.6)">Progress to milestone</span>
<span style="font-size:12px;color:var(--amber);font-weight:700;background:rgba(245,158,11,.15);padding:2px 8px;border-radius:20px">&#x1F381; 50 pts</span>
</div>
<div class="pbg"><div class="pfill" id="pf"></div></div>
<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:rgba(255,255,255,.45)"><span>0</span><span id="pp">70%</span><span>50</span></div>
</div>
</div>
<div class="stats">
<div class="stat"><div style="font-size:18px;margin-bottom:10px">&#x2705;</div><div class="sv" id="sc">7</div><div class="sl">Verified This Week</div></div>
<div class="stat"><div style="font-size:18px;margin-bottom:10px">&#x1F525;</div><div class="sv">4</div><div class="sl">Day Streak</div></div>
</div>
<div class="scan-btn" onclick="simulateScan()">&#x1F4F1; Scan QR Code (Demo)</div>
<div style="padding:0 16px 100px;display:flex;flex-direction:column;gap:10px" id="hist"></div>
</div>
<div class="nav">
<div class="ni a"><div style="font-size:20px">&#x1F3E0;</div><div class="nl">Home</div></div>
<div class="ni"><div style="font-size:20px">&#x1F4F1;</div><div class="nl">Scans</div></div>
<div class="ni"><div style="font-size:20px">&#x1F381;</div><div class="nl">Rewards</div></div>
<div class="ni"><div style="font-size:20px">&#x1F4CB;</div><div class="nl">History</div></div>
</div>
</div>
<script>
var p=35,sc=7;
var merchants=[{n:"McDonald's",e:"&#x1F35F;"},{n:"Chipotle",e:"&#x1F32F;"},{n:"Starbucks",e:"&#x2615;"},{n:"Domino's",e:"&#x1F355;"},{n:"Panda Express",e:"&#x1F961;"},{n:"Sweetgreen",e:"&#x1F957;"},{n:"Burger King",e:"&#x1F354;"}];
var hist=[{n:"McDonald's",e:"&#x1F35F;",t:"2 hours ago"},{n:"Chipotle",e:"&#x1F32F;",t:"Yesterday"},{n:"Starbucks",e:"&#x2615;",t:"Yesterday"},{n:"Domino's",e:"&#x1F355;",t:"2 days ago"},{n:"Sweetgreen",e:"&#x1F957;",t:"3 days ago"}];
function ui(){document.getElementById("pts").innerHTML=p+" <span>pts</span>";var pct=Math.min((p/50)*100,100);document.getElementById("pf").style.width=pct+"%";document.getElementById("pp").textContent=Math.round(pct)+"%";document.getElementById("sc").textContent=sc;var h="";hist.slice(0,8).forEach(function(i){h+='<div class="hi"><div class="hi-icon">'+i.e+'</div><div style="flex:1"><div style="font-size:14px;font-weight:600">'+i.n+' verified</div><div style="font-size:12px;color:#9CA3AF;margin-top:2px">'+i.t+'</div></div><div style="font-size:15px;font-weight:800;color:var(--green)">+5</div></div>'});document.getElementById("hist").innerHTML=h}
function simulateScan(){sc++;p+=5;var m=merchants[Math.floor(Math.random()*merchants.length)];hist.unshift({n:m.n,e:m.e,t:"Just now"});confetti();ui();showToast("+5 pts from "+m.n+"!")}
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2800)}
function confetti(){var a=document.getElementById("app"),c=["#6366F1","#22C55E","#F59E0B","#06B6D4","#EF4444"];for(var i=0;i<18;i++){var d=document.createElement("div");d.className="confetti";d.style.cssText="left:"+(20+Math.random()*60)+"%;top:"+(60+Math.random()*30)+"px;background:"+c[Math.floor(Math.random()*c.length)]+";animation-delay:"+Math.random()*.3+"s;animation-duration:"+(0.8+Math.random()*.6)+"s";a.appendChild(d);setTimeout(function(el){el.remove()},1500,d)}}
ui();setTimeout(function(){document.getElementById("pf").style.width="70%"},300);
</script>
</body>
</html>
